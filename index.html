<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>Trello to Markdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .lang-switcher {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 100;
        }
        select#lang-select {
            background: var(--glass-bg);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(10px);
        }
        select#lang-select option {
            background: var(--bg-color);
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow blob-1"></div>
        <div class="glow blob-2"></div>
        <div class="glow blob-3"></div>
    </div>

    <!-- Language Switcher -->
    <div class="lang-switcher">
        <select id="lang-select">
            <option value="cz">🇨🇿 Čeština</option>
            <option value="en">🇬🇧 English</option>
            <option value="de">🇩🇪 Deutsch</option>
        </select>
    </div>

    <div class="container">
        <header>
            <div class="logo-wrapper">
                <img src="icon.png" alt="App Logo" class="app-logo">
                <h1 data-i18n-html="title">Trello <span>to</span> Markdown</h1>
            </div>
            <p data-i18n="subtitle">Exportujte své Trello nástěnky lokálně do čistého Markdown formátu.</p>
        </header>

        <main class="main-content">
            <section class="left-panel">
                <div id="drop-zone" class="drop-zone glass-card">
                    <div class="drop-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </div>
                    <h2 data-i18n="dropTitle">Přetáhněte JSON soubor sem</h2>
                    <p data-i18n="dropText">nebo klikněte pro výběr souboru</p>
                    <input type="file" id="file-input" accept=".json" hidden>
                    <div id="file-name-display" class="file-name-display hidden"></div>
                </div>

                <div class="settings-panel glass-card">
                    <h3 data-i18n="settingsTitle">Nastavení exportu</h3>
                    <div class="settings-list">
                        <label class="toggle-control">
                            <span class="label-text" data-i18n="optArchived">Zahrnout archivované karty</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-archived">
                                <span class="slider"></span>
                            </div>
                        </label>
                        <label class="toggle-control">
                            <span class="label-text" data-i18n="optComments">Zahrnout komentáře</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-comments" checked>
                                <span class="slider"></span>
                            </div>
                        </label>
                        <label class="toggle-control">
                            <span class="label-text" data-i18n="optChecklists">Zahrnout checklisty</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-checklists" checked>
                                <span class="slider"></span>
                            </div>
                        </label>
                        <label class="toggle-control">
                            <span class="label-text" data-i18n="optCompleted">Zahrnout splněné body (checklist)</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-completed-items" checked>
                                <span class="slider"></span>
                            </div>
                        </label>
                    </div>
                </div>
            </section>

            <section class="right-panel">
                <div class="preview-section glass-card">
                    <div class="preview-header">
                        <h3 data-i18n="previewTitle">Náhled Markdownu</h3>
                        <button id="download-btn" class="btn primary" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            <span data-i18n="btnDownload">Stáhnout .md</span>
                        </button>
                    </div>
                    <div class="preview-content">
                        <div id="loading-overlay" class="loading-overlay hidden">
                            <div class="spinner"></div>
                            <p data-i18n="statusLoading">Zpracovávání...</p>
                        </div>
                        <textarea id="markdown-output" readonly data-i18n-placeholder="placeholder"></textarea>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
