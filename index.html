<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello to Markdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow blob-1"></div>
        <div class="glow blob-2"></div>
        <div class="glow blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" class="logo-icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="9"></rect><rect x="14" y="7" width="3" height="5"></rect></svg>
                <h1>Trello <span>to</span> Markdown</h1>
            </div>
            <p>Exportujte své Trello nástěnky lokálně do čistého Markdown formátu.</p>
        </header>

        <main class="main-content">
            <section class="left-panel">
                <div id="drop-zone" class="drop-zone glass-card">
                    <div class="drop-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </div>
                    <h2>Přetáhněte JSON soubor sem</h2>
                    <p>nebo klikněte pro výběr souboru</p>
                    <input type="file" id="file-input" accept=".json" hidden>
                    <div id="file-name-display" class="file-name-display hidden"></div>
                </div>

                <div class="settings-panel glass-card">
                    <h3>Nastavení exportu</h3>
                    <div class="settings-list">
                        <label class="toggle-control">
                            <span class="label-text">Zahrnout archivované karty</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-archived">
                                <span class="slider"></span>
                            </div>
                        </label>
                        <label class="toggle-control">
                            <span class="label-text">Zahrnout komentáře</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-comments" checked>
                                <span class="slider"></span>
                            </div>
                        </label>
                        <label class="toggle-control">
                            <span class="label-text">Zahrnout checklisty</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-checklists" checked>
                                <span class="slider"></span>
                            </div>
                        </label>
                        <label class="toggle-control">
                            <span class="label-text">Zahrnout splněné body (checklist)</span>
                            <div class="toggle-switch">
                                <input type="checkbox" id="include-completed-items" checked>
                                <span class="slider"></span>
                            </div>
                        </label>
                    </div>
                </div>
            </section>

            <section class="right-panel">
                <div class="preview-section glass-card">
                    <div class="preview-header">
                        <h3>Náhled Markdownu</h3>
                        <button id="download-btn" class="btn primary" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Stáhnout .md
                        </button>
                    </div>
                    <div class="preview-content">
                        <div id="loading-overlay" class="loading-overlay hidden">
                            <div class="spinner"></div>
                            <p>Zpracovávání...</p>
                        </div>
                        <textarea id="markdown-output" readonly placeholder="Zde se zobrazí vygenerovaný Markdown...">Přetáhněte sem váš Trello .json soubor a podívejte se na kouzlo! &#10;&#10;✨ Vše běží lokálně ve vašem prohlížeči.  &#10;🔒 Žádná data se neodesílají na server.</textarea>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
